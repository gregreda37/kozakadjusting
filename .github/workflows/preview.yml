name: Preview Deployment

# Pull request -> build -> deploy a temporary preview channel (expires in 7 days).
# The preview URL is printed in the job logs. Same keyless WIF auth as deploy.yml.

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '__WIF_PROVIDER__'
          service_account: 'github-deploy@kozakadjusting-e76a3.iam.gserviceaccount.com'
          create_credentials_file: true

      - name: Deploy preview channel
        run: npx firebase-tools@latest hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project kozakadjusting-e76a3 --expires 7d --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
