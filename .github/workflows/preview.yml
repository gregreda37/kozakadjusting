name: Preview Deployment

# Runs on every pull request: builds the app and deploys a temporary preview
# channel (expires in 7 days). The preview URL is printed in the job logs.
# Auth uses a FIREBASE_TOKEN secret (from `firebase login:ci`) because this Google
# org enforces iam.disableServiceAccountKeyCreation, which blocks SA-key auth.
on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview channel
        run: npx firebase-tools hosting:channel:deploy pr-${{ github.event.pull_request.number }} --project kozakadjusting-e76a3 --expires 7d --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
