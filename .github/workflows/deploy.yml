name: Deploy to Firebase Hosting

# Runs on every push to main: builds the Vite app and deploys to the live channel.
# Auth uses a FIREBASE_TOKEN secret (from `firebase login:ci`) because this Google
# org enforces iam.disableServiceAccountKeyCreation, which blocks SA-key auth.
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        run: npx firebase-tools deploy --only hosting --project kozakadjusting-e76a3 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
